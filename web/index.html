<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SUT Campus Incident System">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SUT Campus Incident System</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJLCZJWjIJpGmWyAgoLx7XjgTl80O2Qbs"></script>
  
  <script>
    // 💡 ระบบกู้คืนหน้าจออัตโนมัติสำหรับ Flutter Web (แก้ปัญหาจอดำ / จอแข็งบน Chrome Android)
    
    // 1. ตรวจจับ WebGL context lost (WebGL ล่มหลังเบราว์เซอร์พักการทำงานในเบื้องหลัง)
    window.addEventListener('webglcontextlost', function(event) {
      console.warn('WebGL context lost detected! Force reloading page to recover rendering...');
      event.preventDefault();
      window.location.reload();
    }, true);

    // 2. ตรวจจับการพักหน้าเว็บเป็นเวลานาน (Visibility Timeout)
    let lastHiddenTime = 0;
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        lastHiddenTime = Date.now();
      } else {
        // หากผู้ใช้ย้ายแท็บหรือพักหน้าจอนานเกิน 5 นาที (300,000 ms) ให้บังคับรีโหลดใหม่เพื่อล้างหน่วยความจำและการวาดภาพที่ค้างคา
        if (lastHiddenTime > 0 && (Date.now() - lastHiddenTime > 5 * 60 * 1000)) {
          console.log('App suspended for more than 5 minutes. Auto-refreshing session...');
          window.location.reload();
        }
      }
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
