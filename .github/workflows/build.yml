name: Build and Release Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch: # อนุญาตให้กดรันแบบกำหนดเองใน GitHub UI ได้

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Clean Workspace Cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --verbose

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-incident-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Clean Workspace Cache
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Compress Windows Build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows-release.zip

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: campus-incident-windows-app
          path: build/windows-release.zip
